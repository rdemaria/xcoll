[pytest]
addopts = -ra -vv --durations=10 --durations-min=1  --maxschedchunk=1 --html=pytest_results.html --ignore-glob='**/test_assembly.py' --pdbcls=IPython.terminal.debugger:Pdb
generate_report_on_test = True
render_collapsed = all
markers =
    everest
    fluka
    geant4
    context_dependent
    serial
